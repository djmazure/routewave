name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: djmazure/logic-trace
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake git zlib1g-dev \
            libgl1-mesa-dev libglfw3-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev \
            file fuse libfuse2

      - name: Build release (GUI + CLI)
        run: |
          cmake --preset release -DBUILD_GUI=ON
          cmake --build build/release --target routewave routewave_cli -j$(nproc)

      - name: Package tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist/routewave-${VERSION}-linux-x86_64
          cp build/release/routewave dist/routewave-${VERSION}-linux-x86_64/
          cp build/release/routewave_cli dist/routewave-${VERSION}-linux-x86_64/
          cp LICENSE README.md dist/routewave-${VERSION}-linux-x86_64/
          mkdir -p dist/routewave-${VERSION}-linux-x86_64/assets
          cp -r assets/*.ttf assets/*.png dist/routewave-${VERSION}-linux-x86_64/assets/ 2>/dev/null || true
          mkdir -p dist/routewave-${VERSION}-linux-x86_64/assets/fonts
          cp -r assets/fonts/*.ttf assets/fonts/*.otf dist/routewave-${VERSION}-linux-x86_64/assets/fonts/
          cd dist
          tar czf routewave-${VERSION}-linux-x86_64.tar.gz \
            routewave-${VERSION}-linux-x86_64/

      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cmake --install build/release --prefix AppDir/usr
          mkdir -p AppDir/usr/share/applications
          cp assets/routewave.desktop AppDir/usr/share/applications/
          mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
          cp assets/icon_512.png AppDir/usr/share/icons/hicolor/512x512/apps/routewave.png
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage"
          chmod +x linuxdeploy-x86_64.AppImage
          export VERSION
          export APPIMAGE_EXTRACT_AND_RUN=1
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file assets/routewave.desktop \
            --icon-file assets/icon_512.png \
            --output appimage
          mv RouteWave-${VERSION}-x86_64.AppImage dist/ || \
          mv RouteWave*.AppImage dist/ || true

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-tarball
          path: dist/*.tar.gz

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-appimage
          path: dist/*.AppImage

  build-windows:
    name: Build Windows x86_64 (Cross)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          repository: djmazure/logic-trace
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Install MinGW
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake git mingw-w64 zlib1g-dev > /dev/null 2>&1

      - name: Build release (CLI only)
        run: |
          cmake -Bbuild/win64 \
            -DCMAKE_TOOLCHAIN_FILE=cmake/mingw-w64.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_GUI=OFF
          cmake --build build/win64 --target routewave_cli -j$(nproc)

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist/routewave-${VERSION}-windows-x86_64
          cp build/win64/routewave_cli.exe dist/routewave-${VERSION}-windows-x86_64/
          cp LICENSE README.md dist/routewave-${VERSION}-windows-x86_64/
          cd dist
          zip -r routewave-${VERSION}-windows-x86_64.zip \
            routewave-${VERSION}-windows-x86_64/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: dist/*.zip

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
